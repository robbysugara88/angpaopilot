<html lang="id"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Festive Giveaway — Pilih Angpao Keberuntunganmu</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #FFE5B4 0%, #FFB6C1 50%, #FFD700 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #2C2C2A;
  }

  .game-container {
    background: #FFF8EC;
    border-radius: 16px;
    padding: 24px 20px 28px;
    max-width: 540px;
    width: 100%;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    position: relative;
    overflow: hidden;
  }

  .dot { position: absolute; border-radius: 50%; }
  .dot-1 { top: 10px; left: 14px; width: 10px; height: 10px; background: #F4C0D1; }
  .dot-2 { top: 20px; right: 28px; width: 7px; height: 7px; background: #97C459; }
  .dot-3 { bottom: 14px; left: 36px; width: 12px; height: 12px; background: #FAC775; }
  .dot-4 { bottom: 28px; right: 14px; width: 8px; height: 8px; background: #85B7EB; }
  .dot-5 { top: 40%; left: 6px; width: 6px; height: 6px; background: #D4537E; }
  .dot-6 { top: 60%; right: 6px; width: 9px; height: 9px; background: #7F77DD; }

  .header {
    text-align: center;
    margin-bottom: 20px;
    position: relative;
  }

  .badge {
    display: inline-block;
    background: #E24B4A;
    color: #FFF8EC;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    margin: 12px 0 6px;
    color: #501313;
  }

  .subtitle {
    font-size: 14px;
    color: #5F5E5A;
  }

  .picks-counter {
    font-weight: 600;
    color: #993556;
  }

  .envelopes-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 0 auto;
    max-width: 420px;
  }

  .envelope {
    aspect-ratio: 3/4;
    position: relative;
    cursor: pointer;
    transition: transform 0.18s ease;
    perspective: 1000px;
  }

  .envelope.disabled { cursor: default; }

  .envelope-inner {
    width: 100%;
    height: 100%;
    border-radius: 10px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.4s ease, opacity 0.4s ease;
    box-shadow: 0 3px 0 rgba(0, 0, 0, 0.18);
  }

  .envelope-seal {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 600;
  }

  .envelope-prize {
    position: absolute;
    inset: 0;
    background: #FFF8EC;
    border-radius: 10px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px;
    text-align: center;
  }

  .envelope-prize.show { display: flex; }

  .prize-label {
    font-size: 10px;
    color: #5F5E5A;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

  .prize-amount {
    font-size: 16px;
    font-weight: 600;
  }

  .result-board {
    margin-top: 20px;
    display: none;
    animation: fadeIn 0.5s ease;
  }

  .result-board.show { display: block; }

  .result-card {
    background: #FFFFFF;
    border-radius: 12px;
    padding: 16px 20px;
    border: 1px solid rgba(0, 0, 0, 0.08);
    text-align: center;
  }

  .result-label {
    font-size: 12px;
    color: #5F5E5A;
    margin-bottom: 6px;
  }

  .total-display {
    font-size: 32px;
    font-weight: 600;
    color: #3B6D11;
    margin-bottom: 12px;
  }

  .breakdown {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .breakdown-pill {
    background: #FAEEDA;
    color: #854F0B;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
  }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    justify-content: center;
  }

  .btn {
    border: none;
    padding: 11px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.1s ease;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: #E24B4A;
    color: #FFF8EC;
  }

  .btn-primary:hover { background: #C53D3D; }

  .btn-secondary {
    background: transparent;
    color: #5F5E5A;
    border: 1px solid #B4B2A9;
  }

  .btn-secondary:hover { background: #F1EFE8; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: #888780;
    margin-top: 12px;
  }

  /* Confetti for jackpot */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 1000;
  }

  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -20px;
    animation: confetti-fall 3s linear forwards;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .envelope:not(.disabled):hover .envelope-inner {
    transform: translateY(-4px);
  }

  /* Responsive */
  @media (max-width: 480px) {
    h1 { font-size: 22px; }
    .envelopes-grid { gap: 10px; }
    .envelope-seal { width: 32px; height: 32px; font-size: 16px; }
    .prize-amount { font-size: 14px; }
    .total-display { font-size: 26px; }
  }
</style>

<script>
(function(){
  const colors = [
    {bg: '#E24B4A', shadow: '#A32D2D', seal: '#FAC775', sealText: '#A32D2D'},
    {bg: '#D4537E', shadow: '#993556', seal: '#FAC775', sealText: '#993556'},
    {bg: '#BA7517', shadow: '#854F0B', seal: '#FFF8EC', sealText: '#854F0B'},
    {bg: '#639922', shadow: '#3B6D11', seal: '#FAC775', sealText: '#3B6D11'},
    {bg: '#378ADD', shadow: '#185FA5', seal: '#FAC775', sealText: '#185FA5'},
    {bg: '#7F77DD', shadow: '#534AB7', seal: '#FAC775', sealText: '#534AB7'},
    {bg: '#1D9E75', shadow: '#0F6E56', seal: '#FAC775', sealText: '#0F6E56'},
    {bg: '#D85A30', shadow: '#993C1D', seal: '#FFF8EC', sealText: '#993C1D'},
    {bg: '#534AB7', shadow: '#3C3489', seal: '#FAC775', sealText: '#3C3489'}
  ];

  // Probability-weighted prizes. Range Rp 5rb - Rp 50rb.
  // PENTING: Logika ini di client-side, mudah dimanipulasi.
  // Untuk production, pindahkan ke server (lihat catatan di akhir file).
  const prizes = [
    {amount: 5000,  weight: 38, label: 'Rp 5rb'},
    {amount: 10000, weight: 28, label: 'Rp 10rb'},
    {amount: 15000, weight: 15, label: 'Rp 15rb'},
    {amount: 20000, weight: 10, label: 'Rp 20rb'},
    {amount: 25000, weight: 5,  label: 'Rp 25rb'},
    {amount: 50000, weight: 4,  label: 'Rp 50rb'}
  ];

  function drawPrize(){
    const total = prizes.reduce((s,p)=>s+p.weight,0);
    let r = Math.random() * total;
    for (const p of prizes){
      if (r < p.weight) return p;
      r -= p.weight;
    }
    return prizes[0];
  }

  const MAX_PICKS = 3;
  const NUM_ENVELOPES = 9;
  let picksLeft = MAX_PICKS;
  let totalWon = 0;
  let breakdown = [];
  let opened = new Array(NUM_ENVELOPES).fill(false);

  const container = document.getElementById('envelopes');
  const picksLeftEl = document.getElementById('picks-left');
  const resultBoard = document.getElementById('result-board');
  const totalDisplay = document.getElementById('total-display');
  const breakdownEl = document.getElementById('breakdown');
  const subtitle = document.getElementById('subtitle');
  const confettiContainer = document.getElementById('confetti-container');

  function rupiah(n){
    return 'Rp ' + n.toLocaleString('id-ID');
  }

  function fireConfetti(){
    const confettiColors = ['#E24B4A', '#FAC775', '#97C459', '#85B7EB', '#D4537E', '#7F77DD'];
    for (let i = 0; i < 60; i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + '%';
      c.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      c.style.animationDelay = Math.random() * 0.5 + 's';
      c.style.animationDuration = (2 + Math.random() * 2) + 's';
      if (Math.random() > 0.5) c.style.borderRadius = '50%';
      confettiContainer.appendChild(c);
      setTimeout(() => c.remove(), 3500);
    }
  }

  function buildEnvelopes(){
    container.innerHTML = '';
    for (let i = 0; i < NUM_ENVELOPES; i++){
      const c = colors[i % colors.length];
      const wrap = document.createElement('div');
      wrap.className = 'envelope';
      wrap.setAttribute('data-index', i);
      wrap.setAttribute('role', 'button');
      wrap.setAttribute('tabindex', '0');
      wrap.setAttribute('aria-label', 'Angpao ' + (i+1));
      wrap.innerHTML = `
        <div class="envelope-inner" style="background: ${c.bg};">
          <div class="envelope-seal" style="background: ${c.seal}; color: ${c.sealText};">福</div>
        </div>
        <div class="envelope-prize" style="border: 1px solid ${c.shadow};">
          <div class="prize-label">CASHBACK</div>
          <div class="prize-amount" style="color: ${c.shadow};"></div>
        </div>
      `;
      wrap.addEventListener('click', () => openEnvelope(i, wrap));
      wrap.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          openEnvelope(i, wrap);
        }
      });
      container.appendChild(wrap);
    }
  }

  function openEnvelope(i, wrap){
    if (opened[i] || picksLeft <= 0) return;
    opened[i] = true;
    picksLeft--;
    picksLeftEl.textContent = picksLeft;
    wrap.classList.add('disabled');

    const prize = drawPrize();
    totalWon += prize.amount;
    breakdown.push(prize.label);

    const inner = wrap.querySelector('.envelope-inner');
    const prizeBox = wrap.querySelector('.envelope-prize');
    const amountEl = wrap.querySelector('.prize-amount');
    amountEl.textContent = prize.label;

    inner.style.transform = 'rotateY(90deg)';
    inner.style.opacity = '0';
    setTimeout(() => {
      inner.style.display = 'none';
      prizeBox.classList.add('show');
      prizeBox.style.transform = 'rotateY(90deg)';
      requestAnimationFrame(() => {
        prizeBox.style.transition = 'transform 0.3s ease';
        prizeBox.style.transform = 'rotateY(0deg)';
      });
    }, 200);

    // Confetti untuk hadiah terbesar
    if (prize.amount >= 50000){
      setTimeout(fireConfetti, 400);
    }

    if (picksLeft === 0){
      setTimeout(showResults, 800);
    }
  }

  function showResults(){
    subtitle.innerHTML = 'Semua kesempatan terpakai! 🎉';
    totalDisplay.textContent = rupiah(totalWon);
    breakdownEl.innerHTML = breakdown.map(b =>
      `<span class="breakdown-pill">${b}</span>`
    ).join('');
    resultBoard.classList.add('show');

    // Confetti besar untuk hadiah total tinggi
    if (totalWon >= 75000) fireConfetti();
  }

  function reset(){
    picksLeft = MAX_PICKS;
    totalWon = 0;
    breakdown = [];
    opened = new Array(NUM_ENVELOPES).fill(false);
    picksLeftEl.textContent = picksLeft;
    subtitle.innerHTML = 'Kamu punya <span class="picks-counter" id="picks-left">' + MAX_PICKS + '</span> kesempatan memilih';
    resultBoard.classList.remove('show');
    buildEnvelopes();
  }

  document.getElementById('reset-btn').addEventListener('click', reset);

  document.getElementById('claim-btn').addEventListener('click', () => {
    // GANTI BAGIAN INI dengan integrasi backend / form klaim Anda
    // Contoh: redirect ke form WhatsApp atau halaman klaim
    const message = encodeURIComponent(
      'Halo, saya menang cashback ' + rupiah(totalWon) +
      ' dari giveaway angpao!\nBreakdown: ' + breakdown.join(', ')
    );
    // Ganti 6281234567890 dengan nomor WhatsApp bisnis Anda
    window.open('https://wa.me/6281234567890?text=' + message, '_blank');
  });

  buildEnvelopes();
})();
</script>
